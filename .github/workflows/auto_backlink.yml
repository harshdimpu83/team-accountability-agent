name: Auto Backlink Analysis

on:
  schedule:
    - cron: "0 4 * * 1-6"   # 9:30 AM IST (UTC+5:30) — Mon to Sat
  workflow_dispatch:          # allow manual trigger with optional date input
    inputs:
      date:
        description: "Analysis date (YYYY-MM-DD). Leave blank for previous working day."
        required: false
        default: ""

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backlink analysis
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python auto_backlink.py --date "${{ github.event.inputs.date }}"
          else
            python auto_backlink.py
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
